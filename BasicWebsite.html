<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Webpage</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        p {
            color: #555;
        }
        button {
            padding: 10px 15px;
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
        /* New styles for drop zone */
        .drop-zone {
            border: 2px dashed #007BFF;
            border-radius: 12px;
            padding: 30px;
            margin: 20px 0;
            text-align: center;
            background-color: #eef2ff;
            transition: background 0.2s;
            cursor: pointer;
        }
        .drop-zone.drag-over {
            background-color: #cce0ff;
            border-color: #0056b3;
        }
        .file-name-display {
            font-weight: bold;
            margin-top: 10px;
            color: #007BFF;
        }
        #uploadBtn {
            background-color: #28a745;
        }
        #uploadBtn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
        }
        .message.success {
            background-color: #d4edda;
            color: #155724;
        }
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>

    <h1>Welcome to Super Smart Study Assistant</h1>
    <p>This is a basic HTML page.</p>

    <!-- Existing button -->
    <button onclick="showMessage()">Click Me</button>

    <!-- NEW: Drag & Drop Zone + Upload button -->
    <div id="dropZone" class="drop-zone">
        <p>📂 Drag & drop a file here<br>or click to select</p>
        <input type="file" id="fileInput" style="display: none;">
    </div>

    <button id="uploadBtn" disabled>Upload</button>
    <div id="uploadMessage" class="message" style="display: none;"></div>

    <script>
        // Existing function
        function showMessage() {
            alert("Hello! You clicked the button.");
        }

        // ========== NEW: Drag & drop file upload logic ==========
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadMessageDiv = document.getElementById('uploadMessage');

        let selectedFile = null;

        // Click on drop zone triggers file picker
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        // File selected via input
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelection(e.target.files[0]);
            }
        });

        // Drag & drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelection(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelection(file) {
            selectedFile = file;
            // Write the file name inside the drop zone
            dropZone.innerHTML = `
                <p>📄 <strong>${file.name}</strong></p>
                <p style="font-size: 0.9em;">click or drop again to change</p>
                <input type="file" id="fileInput" style="display: none;">
            `;
            // Re-attach the hidden file input to the new DOM element
            const newFileInput = dropZone.querySelector('#fileInput');
            if (newFileInput) {
                newFileInput.addEventListener('change', (e) => {
                    if (e.target.files.length) handleFileSelection(e.target.files[0]);
                });
            }
            uploadBtn.disabled = false;
            uploadMessageDiv.style.display = 'none';
        }

        // Upload button click handler
        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            const formData = new FormData();
            formData.append('file', selectedFile);

            uploadBtn.disabled = true;
            uploadBtn.textContent = 'Uploading...';

            try {
                // IMPORTANT: Change the URL to match your backend endpoint.
                // Assuming your backend runs on the same origin and has an endpoint like /upload
                const response = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                if (response.ok) {
                    uploadMessageDiv.textContent = result.message;  // Expected: "{filename} has been uploaded"
                    uploadMessageDiv.className = 'message success';
                    uploadMessageDiv.style.display = 'block';
                    // Reset UI after successful upload
                    selectedFile = null;
                    dropZone.innerHTML = `
                        <p>📂 Drag & drop a file here<br>or click to select</p>
                        <input type="file" id="fileInput" style="display: none;">
                    `;
                    const newInput = dropZone.querySelector('#fileInput');
                    if (newInput) {
                        newInput.addEventListener('change', (e) => {
                            if (e.target.files.length) handleFileSelection(e.target.files[0]);
                        });
                    }
                    uploadBtn.disabled = true;
                } else {
                    throw new Error(result.error || 'Upload failed');
                }
            } catch (err) {
                uploadMessageDiv.textContent = `❌ Error: ${err.message}`;
                uploadMessageDiv.className = 'message error';
                uploadMessageDiv.style.display = 'block';
                uploadBtn.disabled = false;
            } finally {
                uploadBtn.textContent = 'Upload';
            }
        });
    </script>

</body>
</html>
