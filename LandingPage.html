<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Super Smart Study Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff;
      color: #101010;
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 16px 32px;
      border-bottom: 1px solid #333;
      gap: 12px;
    }

    .nav-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .nav-title {
      font-size: 18px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .main-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 48px;
      font-weight: bold;
      letter-spacing: 4px;
      margin: 0;
    }

    h2 {
      font-size: 28px;
      font-weight: normal;
      margin: 4px 0 12px;
    }

    .description {
      font-size: 16px;
      color: #101010;
      margin-bottom: 32px;
      font-style: italic;
    }

    .button-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 32px;
    }

    .btn {
      background-color: #2d2d2d;
      color: #ffffff;
      border: 2px solid #2d2d2d;
      padding: 14px 40px;
      font-size: 18px;
      font-family: 'Georgia', serif;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s ease;
    }

    .btn:hover {
      background-color: #000000;
      transform: scale(1.05);
    }

    .or {
      font-size: 20px;
      color: #545454;
    }

    .features {
      font-size: 15px;
      color: #545454;
      margin-bottom: 40px;
    }

    .quote {
      font-size: 16px;
      font-style: italic;
      color: #545454;
      max-width: 500px;
      margin-bottom: 4px;
    }

    .quote-author {
      font-size: 14px;
      color: #545454;
    }
  </style>
</head>
<body>

  <nav>
    <img src="sss-logo.png" alt="SSS Logo" class="nav-logo" />
    <span class="nav-title">Super Smart Study Assistant</span>
  </nav>

  <main>
    <img src="sss-logo.png" alt="SSS Logo" class="main-logo" />

    <h1>SUPER SMART</h1>
    <h2>Study Assistant</h2>
    <p class="description">AI-powered study assistant tailored to your course</p>

    <div class="button-row">
      <button class="btn" onclick="goToLogin()">Login</button>
      <span class="or">OR</span>
      <button class="btn" onclick="goToSignup()">Sign Up</button>
    </div>

    <p class="features">
      Personalised Questions &nbsp;|&nbsp;
      Track Progress &nbsp;|&nbsp;
      AI Feedback
    </p>

    <p class="quote">"It is not the mountain we conquer, but ourselves."</p>
    <p class="quote-author">— Sir Edmund Hillary</p>
  </main>

  <script>
    function goToLogin() {
      window.location.href = "login.html";
    }

    function goToSignup() {
      window.location.href = "signup.html";
    }
  </script>

</body>
</html>
