<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Super Smart Study Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=La+Belle+Aurore&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff;
      color: #101010;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
    }


    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }

    .main-logo {
      width: 300px;
      height: 300px;
      object-fit: contain;
      margin-bottom: 20px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-family:'Times New Roman', Times, serif;
      font-size: clamp(2.8rem, 6vw, 4.8rem);
      font-weight: 900;
      letter-spacing: 5px;
      line-height: 1;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    h2 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.6rem);
      font-weight: 700;
      margin: 6px 0 14px;
      animation: fadeUp 0.8s 0.25s ease both;
    }

    .description {
      font-family: 'La Belle Aurore', cursive;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      color: #444;
      margin-bottom: 36px;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .button-row {
      display: flex;
      align-items: center;
      gap: 24px;
      margin-bottom: 36px;
      animation: fadeUp 0.8s 0.38s ease both;
    }

    .btn {
      background-color: #1a1a1a;
      color: #f5f3ee;
      border: none;
      padding: 16px 52px;
      font-family: 'Kurale';
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      letter-spacing: 0.5px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn:hover {
      background-color: #333;
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .or {
      font-family: 'Kurale';
      font-size: 20px;
      color: #545454;
    }

    .features {
      font-family: 'Kurale';
      font-size: 0.95rem;
      font-weight: 500;
      color: #555;
      margin-bottom: 44px;
      letter-spacing: 0.3px;
      animation: fadeUp 0.8s 0.45s ease both;
    }
  </style>
</head>
<body>


  <main>
    <img src="sss-logo.png" alt="SSS Logo" class="main-logo" />

    <h1>SUPER SMART</h1>
    <h2>Study Assistant</h2>
    <p class="description">AI-powered study assistant tailored to your course</p>

    <div class="button-row">
      <button class="btn" onclick="goToLogin()">Login</button>
      <span class="or">OR</span>
      <button class="btn" onclick="goToSignup()">Sign Up</button>
    </div>

    <p class="features">
      🎯 Personalised Questions &nbsp;|&nbsp;
      📊 Track Progress &nbsp;|&nbsp;
      🤖 AI Feedback
    </p>


  
  </main>

  <script>
    function goToLogin() {
      window.location.href = "login.html";
    }
    function goToSignup() {
      window.location.href = "register.html";
    }
  </script>

</body>
</html>
