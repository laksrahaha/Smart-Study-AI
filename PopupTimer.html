<!DOCTYPE html>
<html>
<head>
    <title>Timer with Popup</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        #timer {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
      
        .timer-icon {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            background: #198754;
            color: white;
            padding: 10px;
            border-radius: 50%;
        }

      
        .timer-popup {
            display: none;
            position: fixed;
            top: 70px;
            right: 20px;
            width: 250px;
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        .timer-popup input {
                width: 80%;
                padding: 8px;
                margin: 10px 0;
            }

        .timer-popup button {
                padding: 8px 10px;
                margin: 5px;
                cursor: pointer;
            }

        .modal-content {
            background: white;
            padding: 20px;
            margin: 15% auto;
            width: 300px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            padding: 8px;
            width: 80%;
            margin: 10px 0;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>


    <body>

        
        <div class="timer-icon" onclick="toggleTimer()">
            ⌚
        </div>

        <div id="timerPopup" class="timer-popup">
            <h3>Timer</h3>
            <h1 id="timerDisplay">00:00</h1>

            <input type="number" id="minutesInput" placeholder="Minutes" min="1">

            <div class="controls">
                <button onclick="startTimer()">Start</button>
                <button onclick="resetTimer()">Reset</button>
            </div>
        </div>


        <script>
            let totalSeconds = 0;
            let interval;

            function updateDisplay() {
                let minutes = Math.floor(totalSeconds / 60);
                let seconds = totalSeconds % 60;

                document.getElementById("timerDisplay").textContent =
                    `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
            }

            function startTimer() {
                const minutes = document.getElementById("minutesInput").value;

                if (!minutes || minutes <= 0) {
                    alert("Enter a valid number.");
                    return;
                }

                totalSeconds = minutes * 60;

                clearInterval(interval);
                updateDisplay();
              

                interval = setInterval(() => {
                    if (totalSeconds > 0) {
                        totalSeconds--;
                        updateDisplay();
                    } else {
                        clearInterval(interval);
                        alert("Time's up!");
                    }
                }, 1000);
            }

            function resetTimer() {
                clearInterval(interval);
                totalSeconds = 0;
                updateDisplay();
            }

            function toggleTimer() {
                const popup = document.getElementById("timerPopup");
                popup.style.display = popup.style.display === "block" ? "none" : "block";
            }


            updateDisplay();
        </script>

    </body>
</html>
