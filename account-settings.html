<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings - Smart Study AI</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #eef0ff, #d8ddff, #f7f3ee);
            color: #202842;
        }

        .settings-header {
            background: #202842;
            color: white;
            padding: 18px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        }

        .settings-header h1 {
            font-size: 24px;
        }

        .back-btn {
            text-decoration: none;
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 9px 18px;
            border-radius: 999px;
            font-weight: bold;
            transition: 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.14);
        }

        .settings-container {
            max-width: 520px;
            margin: 55px auto;
            background: rgba(255,255,255,0.88);
            padding: 34px;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(48, 56, 86, 0.14);
        }

        .settings-container h2 {
            margin-bottom: 8px;
            font-size: 30px;
            color: #202842;
        }

        .settings-subtitle {
            color: #5d6678;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        .setting-item {
            padding: 17px 18px;
            border: 1px solid rgba(124, 109, 240, 0.16);
            margin-bottom: 13px;
            border-radius: 16px;
            cursor: pointer;
            background: linear-gradient(135deg, #ffffff, #f4f2ff);
            font-weight: bold;
            box-shadow: 0 8px 20px rgba(48, 56, 86, 0.08);
            transition: 0.25s;
        }

        .setting-item:hover {
            transform: translateY(-3px);
            border-color: #7c6df0;
            box-shadow: 0 12px 28px rgba(48, 56, 86, 0.14);
        }

        .status-message {
            margin-top: 18px;
            font-size: 14px;
            color: #198754;
            font-weight: bold;
            min-height: 18px;
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 28px;
            width: 340px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 18px 45px rgba(0,0,0,0.2);
        }

        .modal-content h3 {
            margin-bottom: 18px;
            font-size: 23px;
            color: #202842;
        }

        .modal-content input,
        .modal-content select {
            width: 100%;
            padding: 11px;
            margin: 8px 0;
            border: 1px solid #cbd1e1;
            border-radius: 10px;
            outline: none;
        }

        .modal-content input:focus,
        .modal-content select:focus {
            border-color: #7c6df0;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }

        .modal-buttons button {
            flex: 1;
        }

        button {
            padding: 10px 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #7c6df0;
            color: white;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #6757dc;
        }

        .secondary-btn {
            background: #eef0ff;
            color: #202842;
        }

        .secondary-btn:hover {
            background: #d8ddff;
        }

        .error-text {
            color: #c62828;
            font-size: 13px;
            margin-top: 5px;
            min-height: 16px;
        }

        .success-text {
            color: #198754;
            font-size: 13px;
            margin-top: 5px;
            min-height: 16px;
        }

        @media (max-width: 650px) {
            .settings-header {
                padding: 16px 20px;
            }

            .settings-header h1 {
                font-size: 19px;
            }

            .settings-container {
                margin: 35px 18px;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <header class="settings-header">
        <h1>Smart Study AI</h1>
        <a href="studentdashboard.html" class="back-btn">← Dashboard</a>
    </header>

    <main class="settings-container">
        <h2>Account Settings</h2>
        <p class="settings-subtitle">
            Update your profile, study preferences, password, and display settings.
        </p>

        <div class="setting-item" onclick="openModal('profileModal')">
            👤 Profile Settings
        </div>

        <div class="setting-item" onclick="openModal('passwordModal')">
            🔒 Change Password
        </div>

        <div class="setting-item" onclick="openModal('studyModal')">
            🎯 Study Preferences
        </div>

        <div class="setting-item" onclick="openModal('textSizeModal')">
            🔤 Text Size
        </div>

        <p class="status-message" id="settingsStatus"></p>
    </main>

    <div id="profileModal" class="modal">
        <div class="modal-content">
            <h3>Profile Settings</h3>

            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email">

            <div class="modal-buttons">
                <button onclick="saveProfile()">Save</button>
                <button class="secondary-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <h3>Change Password</h3>

            <input type="password" id="newPassword" placeholder="New Password">
            <input type="password" id="confirmPassword" placeholder="Confirm Password">

            <p id="passwordMessage" class="error-text"></p>

            <div class="modal-buttons">
                <button onclick="savePassword()">Save</button>
                <button class="secondary-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="studyModal" class="modal">
        <div class="modal-content">
            <h3>Study Preferences</h3>

            <select id="studyLevel">
                <option value="Intermediate">Intermediate</option>
                <option value="Secondary School">Secondary School</option>
                <option value="NCEA">NCEA</option>
                <option value="University/Tertiary">University/Tertiary</option>
                <option value="Other">Other</option>
            </select>

            <div class="modal-buttons">
                <button onclick="saveStudy()">Save</button>
                <button class="secondary-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <div id="textSizeModal" class="modal">
        <div class="modal-content">
            <h3>Text Size</h3>

            <select id="textSizeSelect">
                <option value="8">Extra Small</option>
                <option value="12">Small</option>
                <option value="16">Normal</option>
                <option value="20">Large</option>
                <option value="24">Extra Large</option>
            </select>

            <div class="modal-buttons">
                <button onclick="saveTextSize()">Save</button>
                <button class="secondary-btn" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            document.getElementById(id).classList.add("active");
        }

        function closeModal() {
            document.querySelectorAll(".modal").forEach(modal => {
                modal.classList.remove("active");
            });
        }

        function showStatus(message) {
            const status = document.getElementById("settingsStatus");
            status.textContent = message;

            setTimeout(() => {
                status.textContent = "";
            }, 2500);
        }

        function saveProfile() {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();

            if (!name || !email) {
                showStatus("Please fill in profile name and email.");
                return;
            }

            localStorage.setItem("profile", JSON.stringify({ name, email }));
            localStorage.setItem("username", name);
            localStorage.setItem("email", email);

            closeModal();
            showStatus("Profile settings saved.");
        }

        function savePassword() {
            const password = document.getElementById("newPassword").value;
            const confirm = document.getElementById("confirmPassword").value;
            const message = document.getElementById("passwordMessage");

            message.textContent = "";
            message.className = "error-text";

            if (!password || !confirm) {
                message.textContent = "Please fill in both fields.";
                return;
            }

            if (password.length < 6) {
                message.textContent = "Password must be at least 6 characters.";
                return;
            }

            if (password !== confirm) {
                message.textContent = "Passwords do not match.";
                return;
            }

            localStorage.setItem("password", password);

            message.className = "success-text";
            message.textContent = "Password updated.";

            setTimeout(() => {
                closeModal();
                showStatus("Password updated.");
            }, 700);
        }

        function saveStudy() {
            const studyLevel = document.getElementById("studyLevel").value;

            localStorage.setItem("studyLevel", studyLevel);

            closeModal();
            showStatus("Study preference saved.");
        }

        function saveTextSize() {
            const size = document.getElementById("textSizeSelect").value;

            document.documentElement.style.fontSize = size + "px";
            localStorage.setItem("textSize", size);

            closeModal();
            showStatus("Text size saved.");
        }

        function loadSavedSettings() {
            const profile = JSON.parse(localStorage.getItem("profile") || "{}");

            if (profile.name) {
                document.getElementById("name").value = profile.name;
            } else if (localStorage.getItem("username")) {
                document.getElementById("name").value = localStorage.getItem("username");
            }

            if (profile.email) {
                document.getElementById("email").value = profile.email;
            } else if (localStorage.getItem("email")) {
                document.getElementById("email").value = localStorage.getItem("email");
            }

            const savedStudyLevel = localStorage.getItem("studyLevel");
            if (savedStudyLevel) {
                document.getElementById("studyLevel").value = savedStudyLevel;
            }

            const savedSize = localStorage.getItem("textSize");
            if (savedSize) {
                document.documentElement.style.fontSize = savedSize + "px";
                document.getElementById("textSizeSelect").value = savedSize;
            }
        }

        document.getElementById("textSizeSelect").addEventListener("change", function () {
            document.documentElement.style.fontSize = this.value + "px";
        });

        window.addEventListener("DOMContentLoaded", loadSavedSettings);
    </script>

</body>
</html>
