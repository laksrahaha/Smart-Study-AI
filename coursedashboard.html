<!DOCTYPE html>
<html>
<head>
  <title>Course Dashboard</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f9;
      margin: 0;
    }

    /* Header */
    .header {
      background: #2d2d2d;
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
    }

    .container {
      max-width: 700px;
      margin: 40px auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
    }

    h1 {
      text-align: center;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }

    input {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: #2d2d2d;
      color: white;
      border: none;
      cursor: pointer;
    }

    ul {
      margin-top: 20px;
      padding: 0;
    }

    li {
      list-style: none;
      padding: 12px;
      background: #eee;
      margin-bottom: 8px;
      border-radius: 6px;
    }

    .empty {
      text-align: center;
      color: gray;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="header">
  <div>Smart Study</div>
  <div> 👤 Student Name | ⚙ Settings</div>
</div>

<div class="container">

  <button onclick="goBack()">⬅ Back</button>

  <h1>My Courses</h1>

  <div class="controls">
    <input id="courseTitle" placeholder="Enter course name">
    <button onclick="addCourse()">Add</button>
  </div>

  <div class="controls">
    <input id="search" placeholder="Search courses..." oninput="filterCourses()">
    <button onclick="sortCourses()">Sort A-Z</button>
  </div>

  <ul id="courseList"></ul>

  <p id="emptyMessage" class="empty"></p>

</div>

<script>

const api = "http://localhost:5095/api/course";
let allCourses = [];

// Load courses
async function loadCourses() {
  const res = await fetch(api);
  allCourses = await res.json();
  displayCourses(allCourses);
}

// Display courses
function displayCourses(data) {
  const list = document.getElementById("courseList");
  const empty = document.getElementById("emptyMessage");

  list.innerHTML = "";

  if (data.length === 0) {
    empty.innerText = "No courses yet. Add your first course!";
    return;
  }

  empty.innerText = "";

  data.forEach(course => {
    const li = document.createElement("li");
    li.innerText = course.title;
    list.appendChild(li);
  });
}

// Add course
async function addCourse() {
  const title = document.getElementById("courseTitle").value;

  if (!title) return;

  await fetch(api, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ title: title, userId: "1" })
  });

  document.getElementById("courseTitle").value = "";
  loadCourses();
}

// Search
function filterCourses() {
  const search = document.getElementById("search").value.toLowerCase();

  const filtered = allCourses.filter(c =>
    c.title.toLowerCase().includes(search)
  );

  displayCourses(filtered);
}

// Sort
function sortCourses() {
  const sorted = [...allCourses].sort((a, b) =>
    a.title.localeCompare(b.title)
  );

  displayCourses(sorted);
}

// Back
function goBack() {
  window.location.href = "studentdashboard.html";
}

loadCourses();

</script>

</body>
</html>
