<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Super Smart Study Assistant</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background-color: #ffffff;
      color: #101010;
      font-family: 'Playfair Display', serif;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 14px 32px;
      border-bottom: 1.5px solid #222;
      gap: 12px;
      background-color: #ffffff;
    }

    .nav-logo {
      width: 36px;
      height: 36px;
      object-fit: contain;
    }

    .nav-title {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 1.5px;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 640px;
      padding: 48px 60px 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: clamp(3rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 36px;
      line-height: 1;
    }

    .form-group {
      width: 100%;
      margin-bottom: 20px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 18px 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: #333;
      background: #fff;
      border: 1.5px solid #aaa;
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
      text-align: left;
    }

    input::placeholder {
      color: #aaa;
    }

    input:focus {
      border-color: #333;
    }

    .forgot {
      font-size: 0.95rem;
      color: #444;
      margin-bottom: 24px;
      text-align: center;
    }

    .forgot a {
      color: #444;
      text-decoration: none;
    }

    .forgot a:hover {
      text-decoration: underline;
    }

    .error-msg {
      color: #cc0000;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      margin-bottom: 12px;
      display: none;
      text-align: center;
    }

    .btn-login {
      background-color: #1a1a1a;
      color: #f5f3ee;
      border: none;
      padding: 18px 80px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      border-radius: 10px;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-bottom: 32px;
    }

    .btn-login:hover {
      background-color: #333;
      transform: translateY(-3px);
      box-shadow: 0 10px 28px rgba(0,0,0,0.18);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .signup-link {
      font-size: 1rem;
      font-weight: 700;
      font-style: italic;
      color: #101010;
      text-align: center;
    }

    .signup-link a {
      color: #101010;
      text-decoration: none;
    }

    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <nav>
    <img src="sss-logo.png" alt="SSS Logo" class="nav-logo" />
    <span class="nav-title">Super Smart Study Assistant</span>
  </nav>

  <main>
    <div class="card">

      <h1>WELCOME</h1>

      <div class="form-group">
        <input type="email" id="email" placeholder="Email Address" />
      </div>

      <div class="form-group">
        <input type="password" id="password" placeholder="Password" />
      </div>

      <p class="error-msg" id="errorMsg">Please fill in all fields.</p>

      <p class="forgot">
        Forgot password? <a href="forgot-password.html">Click here</a>
      </p>

      <button class="btn-login" onclick="handleLogin()">Login</button>

      <p class="signup-link">
        Don't have an account? <a href="frontend/register.html">Sign up</a>
      </p>

    </div>
  </main>

  <script>
    const API_BASE = "http://localhost:5095/api";

    async function handleLogin() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");

      errorMsg.style.display = "none";
      errorMsg.textContent = "";

      if (!email || !password) {
        errorMsg.style.display = "block";
        errorMsg.textContent = "Please fill in all fields.";
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/users`);

        if (!response.ok) {
          throw new Error("Could not load users.");
        }

        const users = await response.json();

        const matchedUser = users.find(user =>
          user.email.toLowerCase() === email.toLowerCase() &&
          user.passwordHash === password
        );

        if (!matchedUser) {
          errorMsg.style.display = "block";
          errorMsg.textContent = "Invalid email or password.";
          return;
        }

        localStorage.setItem("userId", matchedUser.id);
        localStorage.setItem("username", matchedUser.username);
        localStorage.setItem("email", matchedUser.email);

        window.location.href = "studentdashboard.html";

      } catch (err) {
        errorMsg.style.display = "block";
        errorMsg.textContent = "Cannot connect to server. Make sure the backend is running.";
        console.error(err);
      }
    }
  </script>

</body>
</html>
