<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Note – Super Smart Study Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    :root {
      --grad-start: #2d2d2d;
      --grad-end: #4e73df;
      --accent: #4e73df;
      --accent-dark: #3a5bbf;
      --danger: #e74c3c;
      --text-dark: #1a1a2e;
      --text-mid: #555577;
      --text-light: #9999bb;
      --border: rgba(255,255,255,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
      background-attachment: fixed;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 16px 36px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 14px;
    }
    .nav-logo { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 15px; font-weight: 800; letter-spacing: 1.5px; flex: 1; color: #fff; opacity: 0.95; }
    .nav-back {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      transition: all 0.2s;
    }
    .nav-back:hover { background: rgba(255,255,255,0.12); color: #fff; }

    main {
      flex: 1;
      padding: 40px 32px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-wrapper { width: 100%; max-width: 860px; display: flex; flex-direction: column; gap: 20px; }

    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }
    .file-name {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      font-style: italic;
    }

    .editor-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 18px;
      color: var(--text-dark);
    }

    .note-title-input {
      width: 100%;
      padding: 14px 18px;
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--text-dark);
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .note-title-input:focus { border-color: var(--accent); background: #fff; }
    .note-title-input::placeholder { color: #c5c8d8; font-style: italic; }

    .course-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .course-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--text-mid);
      white-space: nowrap;
      letter-spacing: 0.3px;
    }
    .course-select {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-dark);
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .course-select:focus { border-color: var(--accent); }

    .no-courses-hint {
      font-size: 0.8rem;
      color: var(--text-light);
      font-weight: 600;
    }
    .no-courses-hint a { color: var(--accent); cursor: pointer; text-decoration: underline; }

    .card-divider { border: none; border-top: 1px solid #eef0f8; }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .toolbar-left { display: flex; gap: 8px; }
    .toolbar-right { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 10px 22px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { transform: translateY(-2px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--grad-start), var(--accent));
      color: #fff;
      box-shadow: 0 4px 14px rgba(78,115,223,0.35);
    }
    .btn-primary:hover { box-shadow: 0 8px 20px rgba(78,115,223,0.45); }

    .btn-outline {
      background: transparent;
      color: var(--text-dark);
      border: 1.5px solid #dde0f0;
    }
    .btn-outline:hover { background: #f7f8fc; border-color: #bbbdd8; }

    .btn-danger-outline {
      background: transparent;
      color: var(--danger);
      border: 1.5px solid #fbd3cf;
    }
    .btn-danger-outline:hover { background: var(--danger); color: #fff; border-color: var(--danger); }

    textarea {
      width: 100%;
      min-height: 420px;
      padding: 20px 22px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--text-dark);
      font-weight: 600;
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 12px;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, background 0.2s;
    }
    textarea:focus { border-color: var(--accent); background: #fff; }
    textarea::placeholder { color: #c5c8d8; font-weight: 400; }

    .status-msg {
      font-size: 0.82rem;
      text-align: right;
      color: var(--text-light);
      font-weight: 700;
      height: 18px;
      transition: color 0.3s;
    }
    .status-msg.saved { color: #27ae60; }

    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55); z-index: 200;
      align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { 
      display: flex; 
    }

    .modal {
      background: #fff; border-radius: 20px; padding: 36px 40px;
      max-width: 400px; width: 92%; text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      animation: fadeUp 0.3s ease both;
      color: var(--text-dark);
    }
    .modal h2 { font-family: 'DM Serif Display', serif; font-size: 1.6rem; font-weight: 400; margin-bottom: 10px; }
    .modal p { font-size: 0.88rem; color: var(--text-mid); margin-bottom: 24px; line-height: 1.6; font-weight: 600; }
    .modal-buttons { display: flex; gap: 10px; justify-content: center; }
    .btn-outline-dark { background: transparent; color: var(--text-dark); border: 1.5px solid #dde0f0; }
    .btn-outline-dark:hover { background: #f7f8fc; }
    .btn-delete { background: var(--danger); color: #fff; box-shadow: 0 4px 12px rgba(231,76,60,0.3); }
    .btn-delete:hover { background: #c0392b; color: #fff; box-shadow: 0 8px 20px rgba(231,76,60,0.4); }

    .editor-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-light);
      font-weight: 700;
    }

    /* ── STUDY MODE ── */
.study-toggle-btn {
  padding: 10px 22px;
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 800;
  cursor: pointer;
  border-radius: 10px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
  border: 1.5px solid #dde0f0;
  background: transparent;
  color: var(--text-dark);
}
.study-toggle-btn.active {
  background: #eafaf1;
  border-color: #a9dfbf;
  color: #1d5c2f;
}

#studyModal {
  display: none;
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  align-items: center;
  justify-content: center;
  border-radius: 20px;
}
#studyModal.active { display: flex; }

.study-quiz-card {
  background: #fff;
  border-radius: 16px;
  padding: 28px 28px 22px;
  max-width: 420px;
  width: 90%;
  box-shadow: 0 24px 64px rgba(0,0,0,0.25);
}
.study-quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.study-quiz-badge {
  font-size: 0.75rem;
  font-weight: 800;
  background: #eafaf1;
  color: #1d5c2f;
  padding: 4px 12px;
  border-radius: 20px;
  letter-spacing: 0.5px;
}
.study-quiz-close-btn {
  background: none; border: none; cursor: pointer;
  font-size: 1.2rem; color: #aaa; line-height: 1;
}
.study-quiz-q {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.5;
  margin-bottom: 16px;
}
.study-quiz-opt {
  display: block;
  width: 100%;
  text-align: left;
  padding: 11px 14px;
  margin-bottom: 9px;
  border-radius: 10px;
  border: 1px solid #e0e0f0;
  background: #fff;
  color: var(--text-dark);
  font-family: 'Nunito', sans-serif;
  font-size: 0.88rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.15s;
}
.study-quiz-opt:hover:not(:disabled) { background: #f0f4ff; }
.study-quiz-opt.correct { background: #eafaf1; border-color: #a9dfbf; color: #1d5c2f; }
.study-quiz-opt.wrong   { background: #fdecea; border-color: #f5b7b1; color: #7b1a1a; }
.study-quiz-loading {
  text-align: center;
  color: var(--text-mid);
  font-weight: 700;
  padding: 20px 0;
  font-size: 0.9rem;
}
.study-quiz-feedback {
  font-size: 0.82rem;
  font-weight: 700;
  color: var(--text-mid);
  margin-top: 8px;
  min-height: 18px;
}
.study-timer-badge {
  font-size: 0.8rem;
  font-weight: 700;
  color: rgba(209, 103, 200, 0.5);
  margin-left: 4px;
}

  </style>
</head>

<body>

  <nav>
    <img src="sss-logo.png" alt="SSS Logo" class="nav-logo" />
    <span class="nav-brand">Super Smart Study Assistant</span>
    <a class="nav-back" onclick="goBack()">← Back to Notes</a>
  </nav>

  

  <main>
    <div class="page-wrapper">

      <div class="header-row">
        <h1>Edit Note ✏️</h1>
        <span class="file-name" id="fileName">New note</span>
      </div>
      
      <div class="editor-card">

        <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Note title..." maxlength="80" />

        <div class="course-row">
          <span class="course-label">📚 Course:</span>
          <select class="course-select" id="courseSelect" onchange="scheduleAutoSave()">
            <option value="">— Uncategorised —</option>
          </select>
          <span class="no-courses-hint" id="noCourseHint" style="display:none">
            No courses yet. <a onclick="goManageCourses()">Add one on the Notes board.</a>
          </span>
        </div>

        <hr class="card-divider" />

        <div class="editor-toolbar">
          <div class="toolbar-left">
            <button class="btn btn-primary" onclick="saveNotes()">💾 Save</button>
            <button class="btn btn-outline" onclick="clearNotes()">Clear</button>
            <button class="btn study-toggle-btn" id="studyModeBtn" onclick="toggleStudyMode()">
  🧠 Study Mode: Off
</button>
<select id="studyIntervalSelect" style="padding:8px 12px;border-radius:10px;border:1.5px solid #dde0f0;font-family:'Nunito',sans-serif;font-size:0.82rem;font-weight:700;color:var(--text-dark);background:#f7f8fc;outline:none;">

  <option value="1">Every 1 min</option>
  <option value="3" selected>Every 3 min</option>
  <option value="5">Every 5 min</option>
  <option value="10">Every 10 min</option>
</select>
<span class="study-timer-badge" id="studyTimerBadge"></span>
            <button class="btn btn-outline" id="summarizeBtn" onclick="summarizeNote()">✨ AI Summary</button>
          </div>
          <div class="toolbar-right">
            <button class="btn btn-danger-outline" onclick="askDelete()">🗑 Delete Note</button>
          </div>
        </div>

        <textarea id="noteEditor" placeholder="Start writing your notes here..."></textarea>

        <!-- AI Summary Panel -->
        <div id="summaryPanel" style="display:none; background:#f0f4ff; border:1.5px solid #c5d0f5; border-radius:12px; padding:18px 20px;">
          <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
            <span style="font-size:0.8rem; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:1px;">✨ AI Summary</span>
            <button onclick="closeSummary()" style="background:none;border:none;cursor:pointer;font-size:1rem;color:#aaa;line-height:1;">✕</button>
          </div>
          <p id="summaryText" style="font-size:0.9rem; line-height:1.7; color:var(--text-dark); font-weight:600; white-space:pre-wrap;"></p>
          
          <button
           class="btn btn-primary"
           style="margin-top:12px;"
           onclick="saveSummary()">
           💾 Save Summary
           </button>

        </div>

        <div class="editor-meta">
          <span id="wordCount">0 words</span>
          <p class="status-msg" id="statusMsg"></p>
        </div>

        <div id="studyModal">
  <div class="study-quiz-card">
    <div class="study-quiz-header">
      <span class="study-quiz-badge">🧠 Study Check</span>
      <button class="study-quiz-close-btn" onclick="closeStudyQuiz()" aria-label="Close">✕</button>
    </div>
    <div id="studyQuizBody">
      <p class="study-quiz-loading">Generating question from your notes...</p>
    </div>
    <p class="study-quiz-feedback" id="studyQuizFeedback"></p>
  </div>
</div>

      </div>

    </div>
  </main>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h2>Delete Note?</h2>
      <p id="deleteModalMsg">This cannot be undone.</p>
      <div class="modal-buttons">
        <button class="btn btn-outline-dark" onclick="closeModal()">Cancel</button>
        <button class="btn btn-delete" onclick="confirmDelete()">🗑 Delete</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:5095/api";

    let currentNoteId = null;
    let currentSummary = "";

    const noteEditor     = document.getElementById('noteEditor');     
    const noteTitleInput = document.getElementById('noteTitleInput');
    const fileName       = document.getElementById('fileName');
    const statusMsg      = document.getElementById('statusMsg');
    const courseSelect   = document.getElementById('courseSelect');
    const wordCountEl    = document.getElementById('wordCount');

    function updateWordCount() {
      const words = noteEditor.value.trim().split(/\s+/).filter(Boolean).length;
      wordCountEl.textContent = words === 1 ? '1 word' : `${words} words`;
    }

    // ── Load courses from backend ──
    async function populateCourseSelect(selectedCourse) {
      try {
        const userId = Number(localStorage.getItem("userId") || "1");
        const res = await fetch(`${API_BASE}/courses`);
        if (!res.ok) throw new Error();
        const courses = await res.json();
        const userCourses = courses.filter(c => Number(c.userId) === userId);
        courseSelect.innerHTML = '<option value="">— Uncategorised —</option>';
        userCourses.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.title; opt.textContent = c.title;
          if (c.title === selectedCourse) opt.selected = true;
          courseSelect.appendChild(opt);
        });
        document.getElementById('noCourseHint').style.display = userCourses.length === 0 ? 'inline' : 'none';
      } catch {
        courseSelect.innerHTML = '<option value="">— Uncategorised —</option>';
      }
    }

    // ── Load existing note from backend ──
    async function loadExistingNote() {
      const editingId = localStorage.getItem("editingNoteId");
      if (editingId) {
        try {
          const res = await fetch(`${API_BASE}/notes/${editingId}`);
          if (!res.ok) throw new Error();
          const note = await res.json();
          currentNoteId = note.id;
          noteTitleInput.value = note.title || "";
          noteEditor.value = note.content || "";
          fileName.textContent = note.title || "Untitled";
          await populateCourseSelect(note.courseName || "");
          updateWordCount();

          const savedSummary =
          localStorage.getItem(`summary_${note.id}`);

           if (savedSummary) {

           currentSummary = savedSummary;

            document.getElementById('summaryText').textContent =
            savedSummary;

          document.getElementById('summaryPanel').style.display =
              'block';
          }  

       } catch {
         currentNoteId = null;
         fileName.textContent = "New note";
        await populateCourseSelect("");
      }
     } else {
       currentNoteId = null;
      fileName.textContent = "New note";
      await populateCourseSelect("");
    }
   }

    // ── Save note to backend ──
    async function saveNotes() {
      const userId = Number(localStorage.getItem("userId") || "1");
      const noteData = {
        userId,
        title: noteTitleInput.value.trim() || 'Untitled',
        content: noteEditor.value,
        courseName: courseSelect.value,
        courseId: null
      };
      try {
        let res;
        if (currentNoteId) {
          res = await fetch(`${API_BASE}/notes/${currentNoteId}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(noteData)
          });
        } else {
          res = await fetch(`${API_BASE}/notes`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(noteData)
          });
          if (res.ok) {
            const saved = await res.json();
            currentNoteId = saved.id;
          }
        }
        if (!res.ok) throw new Error();
        fileName.textContent = noteData.title;
        showStatus('Saved successfully!', true);
        window.location.href = 'notes-board.html';
      } catch {
        showStatus('Save failed. Check backend connection.', false);
      }
    }

    function clearNotes() {
      if (confirm('Clear all content in this note?')) {
        noteEditor.value = '';
        updateWordCount();
        showStatus('Content cleared.');
      }
    }

    // ── Delete ──
    async function deleteNote(id) {
      await fetch(`${API_BASE}/notes/${id}`, { method: "DELETE" });
    }

    function askDelete() {
      const title = noteTitleInput.value.trim() || "Untitled";
      document.getElementById("deleteModalMsg").textContent =
        `Are you sure you want to delete "${title}"? This cannot be undone.`;
      document.getElementById("deleteModal").classList.add("active");
    }

    function closeModal() { document.getElementById('deleteModal').classList.remove('active'); }

    async function confirmDelete() {
      if (currentNoteId) await deleteNote(currentNoteId);
      localStorage.removeItem('editingNoteId');
      window.location.href = 'notes-board.html';
    }

    function goBack() {
      localStorage.removeItem("editingNoteId");
      window.location.href = "notes-board.html";
    }

    function goManageCourses() {
      window.location.href = "coursedashboard.html";
    }

    function showStatus(msg, success = false) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg' + (success ? ' saved' : '');
      setTimeout(() => { statusMsg.textContent = ''; statusMsg.className = 'status-msg'; }, 3000);
    }

    // ── AI Summary ──
    async function summarizeNote() {
      const content = noteEditor.value.trim();
      if (!content) {
        showStatus('Nothing to summarise — write some notes first.', false);
        return;
      }
      const btn = document.getElementById('summarizeBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Summarising...';

      try {
        const res = await fetch(`${API_BASE}/AI/summarize`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content })
        });
        if (!res.ok) throw new Error();
        const data = await res.json();

        currentSummary =
           data.result || data.Result || 'No summary returned.';

        document.getElementById('summaryText').textContent =
           currentSummary;
        document.getElementById('summaryPanel').style.display = 'block';
        document.getElementById('summaryPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      } catch {
        showStatus('Summary failed. Make sure the backend is running.', false);
      } finally {
        btn.disabled = false;
        btn.textContent = '✨ AI Summary';
      }
    }

    function closeSummary() {
  document.getElementById('summaryPanel').style.display = 'none';
}

function saveSummary() {

  if (!currentSummary) {
    showStatus('No summary available.', false);
    return;
  }

  localStorage.setItem(
    `summary_${currentNoteId}`,
    currentSummary
  );

  showStatus('Summary saved!', true);
}

    window.addEventListener("load", loadExistingNote);
  </script>

<script>
// ── STUDY MODE ──
let studyModeActive = false;
let studyTimer = null;
let studyCountdown = 0;
let studyCountdownTimer = null;

function toggleStudyMode() {
  studyModeActive = !studyModeActive;
  const btn = document.getElementById('studyModeBtn');
  if (studyModeActive) {
    btn.textContent = '🧠 Study Mode: On';
    btn.classList.add('active');
    scheduleNextQuiz();
  } else {
    btn.textContent = '🧠 Study Mode: Off';
    btn.classList.remove('active');
    clearTimeout(studyTimer);
    clearInterval(studyCountdownTimer);
    document.getElementById('studyTimerBadge').textContent = '';
  }
}

function scheduleNextQuiz() {
  clearTimeout(studyTimer);
  clearInterval(studyCountdownTimer);
  const mins = parseInt(document.getElementById('studyIntervalSelect').value);
  studyCountdown = mins * 60;
  updateStudyBadge();
  studyCountdownTimer = setInterval(() => {
    studyCountdown--;
    updateStudyBadge();
    if (studyCountdown <= 0) clearInterval(studyCountdownTimer);
  }, 1000);
  studyTimer = setTimeout(fireStudyQuiz, mins * 60 * 1000);
}

function updateStudyBadge() {
  const m = Math.floor(studyCountdown / 60);
  const s = studyCountdown % 60;
  document.getElementById('studyTimerBadge').textContent =
    studyCountdown > 0 ? `(quiz in ${m}:${String(s).padStart(2,'0')})` : '';
}

async function fireStudyQuiz() {
  const rawContent = document.getElementById('noteEditor').value.trim();
  const title = document.getElementById('noteTitleInput').value.trim() || 'these notes';

  if (!rawContent || rawContent.length < 80) {
    if (studyModeActive) scheduleNextQuiz();
    return;
  }

  const content = rawContent
    .replace(/[\u0000-\u001F\u007F-\u009F]/g, ' ')
    .replace(/\\/g, ' ')
    .replace(/"/g, "'")
    .slice(0, 1500);

  const modal = document.getElementById('studyModal');
  document.getElementById('studyQuizBody').innerHTML =
    '<p class="study-quiz-loading">Generating question from your notes...</p>';
  document.getElementById('studyQuizFeedback').textContent = '';
  modal.classList.add('active');

  try {
    const result = await AIQuestionGenerator.generateQuestions({
      topic:      title,
      difficulty: 'Medium',
      notes:      [{ title, content }],
      apiBase:    API_BASE,
      count:      1
    });

    const q = result.questions[0];
    if (!q) throw new Error('No question returned');
    renderStudyQuestion(q);

  } catch (e) {
    console.error('fireStudyQuiz error:', e);
    document.getElementById('studyQuizBody').innerHTML =
      '<p class="study-quiz-loading" style="color:#c0392b">Could not generate question.</p>';
  }
}

function renderStudyQuestion(q) {
  const body = document.getElementById('studyQuizBody');
  body.innerHTML = '';

  const qText = document.createElement('p');
  qText.className = 'study-quiz-q';
  qText.textContent = q.question;
  body.appendChild(qText);

  q.options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'study-quiz-opt';
    btn.textContent = opt;
    btn.addEventListener('click', () => studyPickOpt(btn, opt, q.correctAnswer));
    body.appendChild(btn);
  });
}

function studyPickOpt(el, selected, correct) {
  document.querySelectorAll('.study-quiz-opt').forEach(o => o.disabled = true);
  const feedback = document.getElementById('studyQuizFeedback');
  if (selected === correct) {
    el.classList.add('correct');
    feedback.textContent = '✓ Correct! Great work.';
    setTimeout(closeStudyQuiz, 1800);
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.study-quiz-opt').forEach(o => {
      if (o.textContent.trim() === correct) o.classList.add('correct');
    });
    feedback.textContent = 'Not quite — closing in a moment.';
    setTimeout(closeStudyQuiz, 2200);
  }
}

function closeStudyQuiz() {
  document.getElementById('studyModal').classList.remove('active');
  if (studyModeActive) scheduleNextQuiz();
}
</script>
