<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Note – Super Smart Study Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { 
      margin: 0; 
      padding: 0; 
      box-sizing: border-box; 
    }

    :root {
      --grad-start: #2d2d2d;
      --grad-end: #4e73df;
      --accent: #4e73df;
      --accent-dark: #3a5bbf;
      --danger: #e74c3c;
      --text-dark: #1a1a2e;
      --text-mid: #555577;
      --text-light: #9999bb;
      --border: rgba(255,255,255,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
      background-attachment: fixed;
      color: #fff;
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 16px 36px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 14px;
    }

    .nav-logo { 
      width: 36px; 
      height: 36px; 
      object-fit: contain; 
    }

    .nav-brand {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      flex: 1;
      color: #fff;
      opacity: 0.95;
    }

    .nav-back {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.25);
      transition: all 0.2s;
    }

    .nav-back:hover { 
      background: rgba(255,255,255,0.12); 
      color: #fff; 
    }

    main {
      flex: 1;
      padding: 40px 32px 60px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-wrapper {
      width: 100%;
      max-width: 860px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: 1px;
      line-height: 1;
      text-shadow: 0 2px 16px rgba(0,0,0,0.3);
    }

    .file-name {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.5);
      font-weight: 700;
      font-style: italic;
    }

    .editor-card {
      background: #fff;
      border-radius: 20px;
      padding: 32px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 18px;
      color: var(--text-dark);
    }

    .note-title-input {
      width: 100%;
      padding: 14px 18px;
      font-family: 'DM Serif Display', serif;
      font-size: 1.3rem;
      color: var(--text-dark);
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .note-title-input:focus { 
      border-color: var(--accent); 
      background: #fff; 
    }

    .note-title-input::placeholder { 
      color: #c5c8d8; 
      font-style: italic; 
    }

    .course-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .course-label {
      font-size: 0.82rem;
      font-weight: 800;
      color: var(--text-mid);
      white-space: nowrap;
      letter-spacing: 0.3px;
    }

    .course-select {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--text-dark);
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .course-select:focus { 
      border-color: var(--accent); 
    }

    .no-courses-hint {
      font-size: 0.8rem;
      color: var(--text-light);
      font-weight: 600;
    }

    .no-courses-hint a {
      color: var(--accent);
      cursor: pointer;
      text-decoration: underline;
    }

    .card-divider { 
      border: none; 
      border-top: 1px solid #eef0f8; 
    }

    .editor-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar-left { 
      display: flex; 
      gap: 8px; 
    }

    .toolbar-right { 
      display: flex; 
      gap: 8px; 
      align-items: center; 
    }

    .btn {
      padding: 10px 22px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      letter-spacing: 0.3px;
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { 
      transform: translateY(-2px); 
    }

    .btn:active { 
      transform: translateY(0); 
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--grad-start), var(--accent));
      color: #fff;
      box-shadow: 0 4px 14px rgba(78,115,223,0.35);
    }

    .btn-primary:hover { 
      box-shadow: 0 8px 20px rgba(78,115,223,0.45); 
    }

    .btn-outline {
      background: transparent;
      color: var(--text-dark);
      border: 1.5px solid #dde0f0;
    }

    .btn-outline:hover { 
      background: #f7f8fc; 
      border-color: #bbbdd8; 
    }

    .btn-danger-outline {
      background: transparent;
      color: var(--danger);
      border: 1.5px solid #fbd3cf;
    }

    .btn-danger-outline:hover {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
    }

    textarea {
      width: 100%;
      min-height: 420px;
      padding: 20px 22px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.95rem;
      line-height: 1.85;
      color: var(--text-dark);
      font-weight: 600;
      background: #f7f8fc;
      border: 1.5px solid #e8eaf0;
      border-radius: 12px;
      outline: none;
      resize: vertical;
      transition: border-color 0.2s, background 0.2s;
    }

    textarea:focus { 
      border-color: var(--accent); 
      background: #fff; 
    }

    textarea::placeholder { 
      color: #c5c8d8; 
      font-weight: 400; 
    }

    .status-msg {
      font-size: 0.82rem;
      text-align: right;
      color: var(--text-light);
      font-weight: 700;
      height: 18px;
      transition: color 0.3s;
    }

    .status-msg.saved { 
      color: #27ae60; 
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.active { 
      display: flex; 
    }

    .modal {
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px;
      max-width: 400px;
      width: 92%;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0,0,0,0.22);
      animation: fadeUp 0.3s ease both;
      color: var(--text-dark);
    }

    .modal h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .modal p {
      font-size: 0.88rem;
      color: var(--text-mid);
      margin-bottom: 24px;
      line-height: 1.6;
      font-weight: 600;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .btn-outline-dark {
      background: transparent;
      color: var(--text-dark);
      border: 1.5px solid #dde0f0;
    }

    .btn-outline-dark:hover { 
      background: #f7f8fc; 
    }

    .btn-delete {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 4px 12px rgba(231,76,60,0.3);
    }

    .btn-delete:hover {
      background: #c0392b;
      color: #fff;
      box-shadow: 0 8px 20px rgba(231,76,60,0.4);
    }

    .editor-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-light);
      font-weight: 700;
    }
  </style>
</head>

<body>

  <nav>
    <img src="sss-logo.png" alt="SSS Logo" class="nav-logo" />
    <span class="nav-brand">Super Smart Study Assistant</span>
    <a class="nav-back" onclick="goBack()">← Back to Notes</a>
  </nav>

  <main>
    <div class="page-wrapper">

      <div class="header-row">
        <h1>Edit Note ✏️</h1>
        <span class="file-name" id="fileName">New note</span>
      </div>

      <div class="editor-card">

        <input type="text" class="note-title-input" id="noteTitleInput" placeholder="Note title..." maxlength="80" />

        <div class="course-row">
          <span class="course-label">📚 Course:</span>

          <select class="course-select" id="courseSelect">
            <option value="">— Uncategorised —</option>
          </select>

          <span class="no-courses-hint" id="noCourseHint" style="display:none">
            No courses yet. <a onclick="goManageCourses()">Add one in Course Dashboard.</a>
          </span>
        </div>

        <hr class="card-divider" />

        <div class="editor-toolbar">
          <div class="toolbar-left">
            <button class="btn btn-primary" onclick="saveNotes()">💾 Save</button>
            <button class="btn btn-outline" onclick="clearNotes()">Clear</button>
          </div>

          <div class="toolbar-right">
            <button class="btn btn-danger-outline" onclick="askDelete()">🗑 Delete Note</button>
          </div>
        </div>

        <textarea id="noteEditor" placeholder="Start writing your notes here..."></textarea>

        <div class="editor-meta">
          <span id="wordCount">0 words</span>
          <p class="status-msg" id="statusMsg"></p>
        </div>

      </div>

    </div>
  </main>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <h2>Delete Note?</h2>
      <p id="deleteModalMsg">This cannot be undone.</p>
      <div class="modal-buttons">
        <button class="btn btn-outline-dark" onclick="closeModal()">Cancel</button>
        <button class="btn btn-delete" onclick="confirmDelete()">🗑 Delete</button>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "http://localhost:5095/api";

    let currentNoteId = null;

    const noteEditor = document.getElementById("noteEditor");
    const noteTitleInput = document.getElementById("noteTitleInput");
    const fileName = document.getElementById("fileName");
    const statusMsg = document.getElementById("statusMsg");
    const courseSelect = document.getElementById("courseSelect");
    const wordCountEl = document.getElementById("wordCount");

    function getUserId() {
      return Number(localStorage.getItem("userId") || "1");
    }

    function updateWordCount() {
      const words = noteEditor.value.trim().split(/\s+/).filter(Boolean).length;
      wordCountEl.textContent = words === 1 ? "1 word" : `${words} words`;
    }

    async function populateCourseSelect(selectedCourseName) {
      try {
        const response = await fetch(`${API_BASE}/courses`);

        if (!response.ok) {
          throw new Error("Could not load courses.");
        }

        const courses = await response.json();
        const userId = getUserId();

        const userCourses = courses.filter(course => Number(course.userId) === userId);

        courseSelect.innerHTML = '<option value="">— Uncategorised —</option>';

        userCourses.forEach(course => {
          const option = document.createElement("option");
          option.value = course.title;
          option.textContent = course.title;

          if (course.title === selectedCourseName) {
            option.selected = true;
          }

          courseSelect.appendChild(option);
        });

        document.getElementById("noCourseHint").style.display =
          userCourses.length === 0 ? "inline" : "none";

      } catch (error) {
        console.error("Could not load courses", error);
        courseSelect.innerHTML = '<option value="">— Uncategorised —</option>';
      }
    }

    async function loadExistingNote() {
      const editingId = localStorage.getItem("editingNoteId");

      if (!editingId) {
        currentNoteId = null;
        fileName.textContent = "New note";
        await populateCourseSelect("");
        noteTitleInput.focus();
        updateWordCount();
        return;
      }

      try {
        const response = await fetch(`${API_BASE}/notes/${editingId}`);

        if (!response.ok) {
          throw new Error("Could not load note.");
        }

        const note = await response.json();

        currentNoteId = note.id;
        noteTitleInput.value = note.title || "";
        noteEditor.value = note.content || "";
        fileName.textContent = note.title || "Untitled";

        await populateCourseSelect(note.courseName || "");

        updateWordCount();

      } catch (error) {
        console.error(error);
        currentNoteId = null;
        fileName.textContent = "New note";
        await populateCourseSelect("");
      }
    }

    async function saveNotes() {
      const noteData = {
        userId: getUserId(),
        title: noteTitleInput.value.trim() || "Untitled",
        content: noteEditor.value,
        courseName: courseSelect.value,
        courseId: null
      };

      try {
        let response;

        if (currentNoteId) {
          response = await fetch(`${API_BASE}/notes/${currentNoteId}`, {
            method: "PUT",
            headers: { 
              "Content-Type": "application/json" 
            },
            body: JSON.stringify(noteData)
          });
        } else {
          response = await fetch(`${API_BASE}/notes`, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json" 
            },
            body: JSON.stringify(noteData)
          });
        }

        if (!response.ok) {
          throw new Error("Could not save note.");
        }

        const savedNote = await response.json();

        currentNoteId = savedNote.id;
        localStorage.setItem("editingNoteId", savedNote.id);

        fileName.textContent = savedNote.title || "Untitled";

        showStatus("Saved successfully!", true);

        window.location.href = "notes-board.html";

      } catch (error) {
        console.error(error);
        showStatus("Could not save note. Make sure backend is running.", false);
      }
    }

    noteEditor.addEventListener("input", () => {
      updateWordCount();
    });

    function clearNotes() {
      if (confirm("Clear all content in this note?")) {
        noteEditor.value = "";
        updateWordCount();
        showStatus("Content cleared.");
      }
    }

    function askDelete() {
      const title = noteTitleInput.value.trim() || "Untitled";

      document.getElementById("deleteModalMsg").textContent =
        `Are you sure you want to delete "${title}"? This cannot be undone.`;

      document.getElementById("deleteModal").classList.add("active");
    }

    function closeModal() {
      document.getElementById("deleteModal").classList.remove("active");
    }

    async function confirmDelete() {
      if (!currentNoteId) {
        window.location.href = "notes-board.html";
        return;
      }

      try {
        await fetch(`${API_BASE}/notes/${currentNoteId}`, {
          method: "DELETE"
        });

        localStorage.removeItem("editingNoteId");
        window.location.href = "notes-board.html";

      } catch (error) {
        console.error(error);
        showStatus("Could not delete note.", false);
      }
    }

    function goBack() {
      localStorage.removeItem("editingNoteId");
      window.location.href = "notes-board.html";
    }

    function goManageCourses() {
      window.location.href = "coursedashboard.html";
    }

    function showStatus(msg, success = false) {
      statusMsg.textContent = msg;
      statusMsg.className = "status-msg" + (success ? " saved" : "");

      setTimeout(() => {
        statusMsg.textContent = "";
        statusMsg.className = "status-msg";
      }, 3000);
    }

    window.addEventListener("load", loadExistingNote);
  </script>

</body>
</html>
