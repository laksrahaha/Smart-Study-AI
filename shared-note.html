<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shared Note – Super Smart Study Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --grad-start: #2d2d2d;
      --grad-end: #4e73df;
      --accent: #4e73df;
      --accent-dark: #3a5bbf;
      --text-dark: #1a1a2e;
      --text-mid: #555577;
      --text-light: #9999bb;
      --border: rgba(255,255,255,0.15);
      --shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--grad-start) 0%, var(--grad-end) 100%);
      background-attachment: fixed;
      font-family: 'Nunito', sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 36px;
      background: rgba(0,0,0,0.25);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo { width: 36px; height: 36px; object-fit: contain; }
    .nav-brand { font-size: 15px; font-weight: 800; letter-spacing: 1.5px; flex: 1; }

    .nav-badge {
      font-size: 0.78rem;
      font-weight: 800;
      padding: 5px 14px;
      border-radius: 20px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.75);
      letter-spacing: 0.5px;
    }

    main {
      flex: 1;
      padding: 48px 32px 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-wrapper {
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .shared-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 800;
      color: rgba(255,255,255,0.45);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .shared-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a9dfbf;
      box-shadow: 0 0 6px #a9dfbf;
    }

    .note-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      color: var(--text-dark);
    }

    .note-card-header {
      padding: 32px 36px 24px;
      border-bottom: 1px solid #eef0f8;
    }

    .note-title {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .note-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.78rem;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
      background: #f0f4ff;
      color: var(--accent);
      border: 1px solid #dde4ff;
    }

    .note-card-body {
      padding: 32px 36px;
    }

    .note-content {
      font-size: 0.97rem;
      line-height: 1.9;
      color: var(--text-dark);
      font-weight: 600;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .footer-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 36px;
      border-top: 1px solid #eef0f8;
      background: #fafbff;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand {
      font-size: 0.78rem;
      font-weight: 800;
      color: var(--text-light);
      letter-spacing: 0.5px;
    }

    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
    }

    .copy-btn:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .copy-btn:active { transform: translateY(0); }

    /* States */
    .state-card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 60px 40px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .state-icon {
      font-size: 3rem;
      margin-bottom: 16px;
      display: block;
    }

    .state-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.6rem;
      font-weight: 400;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.9);
    }

    .state-sub {
      font-size: 0.88rem;
      font-weight: 600;
      color: rgba(255,255,255,0.45);
    }

    .skeleton-line {
      height: 14px;
      border-radius: 7px;
      background: linear-gradient(90deg, #eef0f8 25%, #f7f8fc 50%, #eef0f8 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 12px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-title { height: 36px; width: 60%; border-radius: 8px; margin-bottom: 20px; }
  </style>
</head>

<body>

  <nav>
    <img src="sss-logo.png" alt="SSS Logo" class="nav-logo" />
    <span class="nav-brand">Super Smart Study Assistant</span>
    <span class="nav-badge">📤 Shared Note</span>
  </nav>

  <main>
    <div class="page-wrapper">

      <div class="shared-label">Shared with you</div>

      <div id="noteCard" class="note-card">
        <div class="note-card-header">
          <div class="skeleton-line skeleton-title"></div>
          <div class="note-meta">
            <div class="skeleton-line" style="width:80px;height:24px;margin:0;border-radius:20px;"></div>
            <div class="skeleton-line" style="width:100px;height:24px;margin:0;border-radius:20px;"></div>
          </div>
        </div>
        <div class="note-card-body">
          <div class="skeleton-line" style="width:100%"></div>
          <div class="skeleton-line" style="width:88%"></div>
          <div class="skeleton-line" style="width:94%"></div>
          <div class="skeleton-line" style="width:72%"></div>
          <div class="skeleton-line" style="width:85%"></div>
        </div>
      </div>

    </div>
  </main>

  <script>
    const API_BASE = 'http://localhost:5095/api';
    const params = new URLSearchParams(window.location.search);
    const shareToken = params.get('token');

    function wordCount(text) {
      return text.trim().split(/\s+/).filter(Boolean).length;
    }

    function readTime(text) {
      const mins = Math.ceil(wordCount(text) / 200);
      return mins === 1 ? '1 min read' : `${mins} min read`;
    }

    async function loadNote() {
      if (!shareToken) {
        showError('No share token provided.');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/notes/shared/${shareToken}`);
        if (!res.ok) throw new Error('not found');
        const note = await res.json();
        renderNote(note);
      } catch {
        showError('This note could not be found or the link has expired.');
      }
    }

    function renderNote(note) {
      const card = document.getElementById('noteCard');
      const words = wordCount(note.content || '');
      const course = note.courseName ? `📚 ${note.courseName}` : null;

      card.innerHTML = `
        <div class="note-card-header">
          <h1 class="note-title">${escapeHtml(note.title || 'Untitled Note')}</h1>
          <div class="note-meta">
            <span class="meta-pill">📖 ${words.toLocaleString()} words</span>
            <span class="meta-pill">⏱ ${readTime(note.content || '')}</span>
            ${course ? `<span class="meta-pill">${escapeHtml(course)}</span>` : ''}
          </div>
        </div>
        <div class="note-card-body">
          <div class="note-content" id="noteContent">${escapeHtml(note.content || '')}</div>
        </div>
        <div class="footer-bar">
          <span class="footer-brand">Super Smart Study Assistant</span>
          <button class="copy-btn" onclick="copyNote()">📋 Copy text</button>
        </div>
      `;

      document.title = `${note.title || 'Shared Note'} – SSS`;
    }

    function showError(msg) {
      const card = document.getElementById('noteCard');
      card.outerHTML = `
        <div class="state-card">
          <span class="state-icon">🔍</span>
          <p class="state-title">Note not found</p>
          <p class="state-sub">${escapeHtml(msg)}</p>
        </div>
      `;
    }

    function copyNote() {
      const el = document.getElementById('noteContent');
      if (!el) return;
      navigator.clipboard.writeText(el.textContent).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✓ Copied!';
        setTimeout(() => btn.innerHTML = '📋 Copy text', 2000);
      });
    }

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadNote();
  </script>

</body>
</html>
