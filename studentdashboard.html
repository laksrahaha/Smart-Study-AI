<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #1a1a1a;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: white;
      border-bottom: 1px solid #eee;
    }

    .nav-right {
      color: #555;
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 50px 20px 30px;
      background: linear-gradient(135deg, #6C63FF, #8a84ff);
      color: white;
    }

    .hero h1 {
      margin: 0;
      font-size: 36px;
      letter-spacing: 1px;
    }

    .hero p {
      margin-top: 10px;
      opacity: 0.9;
    }

    /* MAIN */
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
      text-align: center;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 220px;
      cursor: pointer;
      border: 1px solid #eee;
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: #6C63FF;
      box-shadow: 0 6px 18px rgba(108,99,255,0.15);
    }

    .card-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 14px;
      color: #777;
    }

    .motivation {
      margin-top: 25px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div></div>
  <div class="nav-right">Student Name | Settings</div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Smart Study AI</h1>
  <p>Welcome back to your intelligent study companion 👋</p>
</div>

<!-- MAIN -->
<div class="container">

  <div class="cards">

    <div class="card" onclick="goToCourses()">
      <div class="card-title">Courses</div>
      <div class="card-desc">Manage your subjects</div>
    </div>

    <div class="card">
      <div class="card-title">Notes</div>
      <div class="card-desc">Review and edit notes</div>
    </div>

    <div class="card">
      <div class="card-title">Quiz</div>
      <div class="card-desc">Practice and test yourself</div>
    </div>

  </div>

  <div class="motivation">
    “Stay consistent. Small progress leads to big results.”
  </div>

</div>

<script>
function goToCourses() {
  window.location.href = "coursedashboard.html";
}
</script>

</body>
</html>
